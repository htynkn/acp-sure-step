<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACP Sure Step – Web UI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .flow-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            padding: 24px 0;
        }
        .step-card {
            min-width: 130px;
            cursor: pointer;
            transition: box-shadow 0.2s ease, transform 0.1s ease;
            border-radius: 10px;
        }
        .step-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.18); transform: translateY(-2px); }
        .step-arrow { font-size: 1.5rem; color: #6c757d; line-height: 1; }
        /* Step state colours */
        .step-pending  { border-left: 6px solid #6c757d; }
        .step-running  { border-left: 6px solid #0d6efd; animation: pulse 1.2s infinite; }
        .step-completed { border-left: 6px solid #198754; }
        .step-failed   { border-left: 6px solid #dc3545; }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(13,110,253,.4); }
            70%  { box-shadow: 0 0 0 8px rgba(13,110,253,0); }
            100% { box-shadow: 0 0 0 0 rgba(13,110,253,0); }
        }
        #logPanel pre { max-height: 400px; overflow-y: auto; font-size: .85rem; }
        .badge-pending   { background-color: #6c757d; }
        .badge-running   { background-color: #0d6efd; }
        .badge-completed { background-color: #198754; }
        .badge-failed    { background-color: #dc3545; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">⚙ ACP Sure Step – Web UI</span>
    </div>
</nav>

<div class="container">

    <!-- Configuration form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">Flow Configuration</div>
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label for="taskFile" class="form-label">Task file (task.json)</label>
                    <input type="text" id="taskFile" class="form-control" placeholder="/path/to/task.json">
                </div>
                <div class="col-md-5">
                    <label for="flowFile" class="form-label">Flow file (config.xml)</label>
                    <input type="text" id="flowFile" class="form-control" placeholder="/path/to/config.xml">
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-primary w-100" onclick="loadFlow()">Load</button>
                </div>
            </div>
            <div id="loadError" class="alert alert-danger mt-3 d-none"></div>
        </div>
    </div>

    <!-- Flow visualization -->
    <div class="card shadow-sm mb-4" id="flowSection" style="display:none!important">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">Flow Chain</span>
            <button class="btn btn-success btn-sm" id="startBtn" onclick="startFlow()">▶ Start Flow</button>
        </div>
        <div class="card-body">
            <div id="statusBanner" class="alert d-none"></div>
            <div class="flow-container" id="flowContainer"></div>
        </div>
    </div>

    <!-- Log panel -->
    <div class="card shadow-sm mb-4" id="logSection" style="display:none!important">
        <div class="card-header fw-semibold">
            Logs for step: <span id="logStepId" class="badge bg-secondary"></span>
        </div>
        <div class="card-body" id="logPanel">
            <pre id="logContent" class="bg-dark text-light rounded p-3">No logs yet.</pre>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmA/jcxg4nVMp0bYVFnp9KqXdkb0"
        crossorigin="anonymous"></script>
<script>
    let pollInterval = null;

    function loadFlow() {
        const taskFile = document.getElementById('taskFile').value.trim();
        const flowFile = document.getElementById('flowFile').value.trim();
        if (!taskFile || !flowFile) {
            showLoadError('Please enter both file paths.');
            return;
        }

        const body = new URLSearchParams({ taskFile, flowFile });
        fetch('/api/flow/load', { method: 'POST', body })
            .then(r => r.json())
            .then(status => {
                if (!status.loaded) {
                    showLoadError(status.errorMessage || 'Failed to load flow.');
                    return;
                }
                hideLoadError();
                renderFlow(status);
                document.getElementById('flowSection').style.removeProperty('display');
                document.getElementById('logSection').style.setProperty('display', 'none', 'important');
                document.getElementById('startBtn').disabled = false;
            })
            .catch(e => showLoadError('Request failed: ' + e.message));
    }

    function startFlow() {
        document.getElementById('startBtn').disabled = true;
        fetch('/api/flow/start', { method: 'POST' })
            .then(r => r.json())
            .then(resp => {
                if (resp.error) {
                    alert(resp.error);
                    document.getElementById('startBtn').disabled = false;
                } else {
                    startPolling();
                }
            })
            .catch(e => {
                alert('Failed to start flow: ' + e.message);
                document.getElementById('startBtn').disabled = false;
            });
    }

    function startPolling() {
        stopPolling();
        pollInterval = setInterval(pollStatus, 1000);
    }

    function stopPolling() {
        if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    function pollStatus() {
        fetch('/api/flow/status')
            .then(r => r.json())
            .then(status => {
                renderFlow(status);
                if (!status.running) {
                    stopPolling();
                    document.getElementById('startBtn').disabled = false;
                }
            });
    }

    function renderFlow(status) {
        const container = document.getElementById('flowContainer');
        container.innerHTML = '';

        const steps = status.steps || [];
        steps.forEach((step, idx) => {
            if (idx > 0) {
                const arrow = document.createElement('span');
                arrow.className = 'step-arrow';
                arrow.textContent = '→';
                container.appendChild(arrow);
            }
            container.appendChild(buildStepCard(step));
        });

        // Status banner
        const banner = document.getElementById('statusBanner');
        if (status.running) {
            banner.className = 'alert alert-info';
            banner.textContent = '⏳ Flow is running…';
            banner.classList.remove('d-none');
        } else if (status.completed) {
            banner.className = 'alert alert-success';
            banner.textContent = '✅ Flow completed successfully.';
            banner.classList.remove('d-none');
        } else if (status.failed) {
            banner.className = 'alert alert-danger';
            banner.textContent = '❌ Flow failed: ' + (status.errorMessage || '');
            banner.classList.remove('d-none');
        } else {
            banner.classList.add('d-none');
        }
    }

    function buildStepCard(step) {
        const state = (step.state || 'PENDING').toLowerCase();
        const card = document.createElement('div');
        card.className = `card step-card step-${state} p-2 text-center`;
        card.onclick = () => showLogs(step.id);
        card.title = 'Click to see logs';

        const idEl = document.createElement('div');
        idEl.className = 'fw-bold small mb-1';
        idEl.textContent = step.id;

        const badge = document.createElement('span');
        badge.className = `badge badge-${state} text-white`;
        badge.textContent = step.state || 'PENDING';

        card.appendChild(idEl);
        card.appendChild(badge);

        if (step.errorMessage) {
            const err = document.createElement('div');
            err.className = 'text-danger small mt-1';
            err.textContent = step.errorMessage;
            card.appendChild(err);
        }
        return card;
    }

    function showLogs(stepId) {
        document.getElementById('logStepId').textContent = stepId;
        document.getElementById('logSection').style.removeProperty('display');
        document.getElementById('logContent').textContent = 'Loading…';

        fetch('/api/flow/logs/' + encodeURIComponent(stepId))
            .then(r => r.json())
            .then(lines => {
                document.getElementById('logContent').textContent =
                    lines.length ? lines.join('\n') : '(no logs captured for this step)';
            });
    }

    function showLoadError(msg) {
        const el = document.getElementById('loadError');
        el.textContent = msg;
        el.classList.remove('d-none');
    }

    function hideLoadError() {
        document.getElementById('loadError').classList.add('d-none');
    }
</script>
</body>
</html>
