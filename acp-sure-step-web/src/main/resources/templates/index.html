<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACP Sure Step – Web UI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        body { background-color: #f8f9fa; }
        .flow-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding: 24px 0;
        }
        .step-card {
            min-width: 140px;
            cursor: pointer;
            transition: box-shadow 0.2s ease, transform 0.15s ease;
            border-radius: 10px;
        }
        .step-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.18); transform: translateY(-2px); }
        .step-arrow { font-size: 1.6rem; color: #6c757d; line-height: 1; user-select: none; }
        .step-pending   { border-left: 6px solid #6c757d; }
        .step-running   { border-left: 6px solid #0d6efd; animation: pulse 1.2s infinite; }
        .step-completed { border-left: 6px solid #198754; }
        .step-failed    { border-left: 6px solid #dc3545; }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(13,110,253,.4); }
            70%  { box-shadow: 0 0 0 8px rgba(13,110,253,0); }
            100% { box-shadow: 0 0 0 0 rgba(13,110,253,0); }
        }
        #logContent { max-height: 420px; overflow-y: auto; font-size: .85rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">⚙ ACP Sure Step – Web UI</span>
    </div>
</nav>

<div id="app" class="container">

    <!-- Toast notifications -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999">
        <div v-if="toast.show" class="toast show align-items-center"
             :class="'text-bg-' + toast.type" role="alert">
            <div class="d-flex">
                <div class="toast-body">{{ toast.message }}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        @click="toast.show = false"></button>
            </div>
        </div>
    </div>

    <!-- Configuration form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">Flow Configuration</div>
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label">Task file (task.json)</label>
                    <input v-model="taskFile" type="text" class="form-control" placeholder="/path/to/task.json">
                </div>
                <div class="col-md-5">
                    <label class="form-label">Flow file (config.xml)</label>
                    <input v-model="flowFile" type="text" class="form-control" placeholder="/path/to/config.xml">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" :disabled="loadBusy" @click="loadFlow">
                        <span v-if="loadBusy" class="spinner-border spinner-border-sm me-1"></span>
                        Load
                    </button>
                </div>
            </div>
            <div v-if="loadError" class="alert alert-danger mt-3 mb-0">{{ loadError }}</div>
        </div>
    </div>

    <!-- Flow visualization -->
    <div v-if="flowLoaded" class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">Flow Chain</span>
            <button class="btn btn-success btn-sm" :disabled="status.running" @click="startFlow">
                <span v-if="status.running" class="spinner-border spinner-border-sm me-1"></span>
                ▶ Start Flow
            </button>
        </div>
        <div class="card-body">

            <!-- Status banner -->
            <div v-if="status.running"   class="alert alert-info  mb-3">⏳ Flow is running…</div>
            <div v-if="status.completed" class="alert alert-success mb-3">✅ Flow completed successfully.</div>
            <div v-if="status.failed"    class="alert alert-danger mb-3">❌ Flow failed: {{ status.errorMessage }}</div>

            <!-- Step cards -->
            <div class="flow-container">
                <template v-for="(step, idx) in status.steps" :key="step.id">
                    <span v-if="idx > 0" class="step-arrow">→</span>
                    <div class="card step-card p-2 text-center"
                         :class="'step-' + step.state.toLowerCase()"
                         :title="'Click to view logs for ' + step.id"
                         @click="showLogs(step)">
                        <div class="fw-bold small mb-1">{{ step.id }}</div>
                        <span class="badge text-white" :class="badgeClass(step.state)">{{ step.state }}</span>
                        <div v-if="step.errorMessage" class="text-danger small mt-1">{{ step.errorMessage }}</div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Log panel -->
    <div v-if="selectedStep" class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between align-items-center fw-semibold">
            <span>Logs for step: <span class="badge bg-secondary">{{ selectedStep }}</span></span>
            <button type="button" class="btn-close" @click="selectedStep = null"></button>
        </div>
        <div class="card-body p-0">
            <pre id="logContent" class="bg-dark text-light rounded p-3 mb-0">{{ logContent }}</pre>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmA/jcxg4nVMp0bYVFnp9KqXdkb0"
        crossorigin="anonymous"></script>
<script src="/js/vue.global.prod.js"></script>
<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            taskFile: '',
            flowFile: '',
            loadBusy: false,
            loadError: null,
            flowLoaded: false,
            status: { loaded: false, running: false, completed: false, failed: false, errorMessage: null, steps: [] },
            selectedStep: null,
            logLines: [],
            logError: null,
            pollTimer: null,
            pollFailures: 0,
            toast: { show: false, type: 'danger', message: '' }
        };
    },
    computed: {
        logContent() {
            if (this.logError) return this.logError;
            return this.logLines.length ? this.logLines.join('\n') : '(no logs captured for this step)';
        }
    },
    methods: {
        showToast(message, type = 'danger') {
            this.toast = { show: true, type, message };
            setTimeout(() => { this.toast.show = false; }, 4000);
        },
        async loadFlow() {
            if (!this.taskFile.trim() || !this.flowFile.trim()) {
                this.loadError = 'Please enter both file paths.';
                return;
            }
            this.loadBusy = true;
            this.loadError = null;
            try {
                const body = new URLSearchParams({ taskFile: this.taskFile.trim(), flowFile: this.flowFile.trim() });
                const resp = await fetch('/api/flow/load', { method: 'POST', body });
                const data = await resp.json();
                if (!data.loaded) {
                    this.loadError = data.errorMessage || 'Failed to load flow.';
                } else {
                    this.status = data;
                    this.flowLoaded = true;
                    this.selectedStep = null;
                }
            } catch (e) {
                this.loadError = 'Request failed: ' + e.message;
            } finally {
                this.loadBusy = false;
            }
        },
        async startFlow() {
            try {
                const resp = await fetch('/api/flow/start', { method: 'POST' });
                const data = await resp.json();
                if (data.error) {
                    this.showToast(data.error);
                } else {
                    this.pollFailures = 0;
                    this.startPolling();
                }
            } catch (e) {
                this.showToast('Failed to start flow: ' + e.message);
            }
        },
        startPolling() {
            this.stopPolling();
            this.pollTimer = setInterval(this.pollStatus, 1000);
        },
        stopPolling() {
            if (this.pollTimer) { clearInterval(this.pollTimer); this.pollTimer = null; }
        },
        async pollStatus() {
            try {
                const resp = await fetch('/api/flow/status');
                if (!resp.ok) throw new Error('Server returned ' + resp.status);
                const data = await resp.json();
                this.status = data;
                this.pollFailures = 0;
                if (!data.running) this.stopPolling();
            } catch (e) {
                this.pollFailures++;
                if (this.pollFailures >= 3) {
                    this.stopPolling();
                    this.showToast('Lost connection while polling flow status.');
                }
            }
        },
        async showLogs(step) {
            this.selectedStep = step.id;
            this.logLines = [];
            this.logError = null;
            try {
                const resp = await fetch('/api/flow/logs/' + encodeURIComponent(step.id));
                if (!resp.ok) throw new Error('Server returned ' + resp.status);
                this.logLines = await resp.json();
            } catch (e) {
                this.logError = 'Failed to load logs: ' + e.message;
            }
        },
        badgeClass(state) {
            return {
                PENDING:   'bg-secondary',
                RUNNING:   'bg-primary',
                COMPLETED: 'bg-success',
                FAILED:    'bg-danger'
            }[state] || 'bg-secondary';
        }
    }
}).mount('#app');
</script>
</body>
</html>
