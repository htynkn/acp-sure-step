name: Deploy SNAPSHOT to Maven Central

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: oss
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN

      - name: Validate deploy credentials
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
        run: |
          if [ -z "$OSSRH_USERNAME" ] || [ -z "$OSSRH_TOKEN" ]; then
            echo "::error title=Missing Secrets::OSSRH_USERNAME and/or OSSRH_TOKEN are not configured. Add them in Settings > Secrets and variables > Actions. Generate User Tokens at https://central.sonatype.com/account"
            exit 1
          fi

      - name: Build and test
        run: mvn -B test --file pom.xml

      - name: Deploy SNAPSHOT artifacts
        run: mvn -B deploy -DskipTests --file pom.xml
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
