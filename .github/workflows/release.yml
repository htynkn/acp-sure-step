name: Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: acp-sure-step-cli
          path: acp-sure-step-cli/target/acp-sure-step-cli-*.jar

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: acp-sure-step-web
          path: acp-sure-step-web/target/acp-sure-step-web-*.jar
